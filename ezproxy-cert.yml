---
- hosts: ezproxy
  any_errors_fatal: true # Will abort if any task fails
  become: true

  tasks:
  - name: Set ezproxy paths
    ansible.builtin.set_fact:
      ezproxy_ssl_path: '/data/ezproxy/ssl'
      local_ssl_path: "{{ [playbook_dir, 'ezproxy_ssl'] | path_join }}"
      local_file_name: ezproxy
      suffixes:
        - '.crt'
        - '.ca'
        - '.key'

  - name: Check if local certificate files exist
    delegate_to: localhost
    run_once: true
    ansible.builtin.stat:
      path: "{{ item }}"

    register: local_files
    # Hack to prepend suffixes, need item to contain full path in fail msg
    loop: "{{ suffixes | map('regex_replace', '^', ([local_ssl_path, local_file_name] | path_join)) | list }}"

  - name: Debug
    debug:
      var: local_files.results

  - name: Set missing local files
    ansible.builtin.set_fact:
      missing_local_files: "{{ local_files.results | rejectattr('stat.exists') | list }}"

  - name: Abort if any local certificat file does not exist
    fail:
      msg: "Missing certificate files: {{ missing_local_files | map(attribute='item') | list }}"
    when: missing_local_files | length > 0

  - name: Get current certificates
    ansible.builtin.find:
      paths: "{{ ezproxy_ssl_path }}"
      patterns: '*.crt'
      file_type: file
    register: certificate_files

  - name: Current certificate number
    ansible.builtin.set_fact:
      current_certificate_number: "{{ certificate_files.files | map(attribute='path') | sort | last | regex_replace('.*\\/0*', '') | regex_replace('\\.crt', '') | int }}"

  - name: Set next certificate file name
    ansible.builtin.set_fact:
      current_file_name: "{{ '%08d' % current_certificate_number }}"

  - name: Get checksum of current certificate
    ansible.builtin.stat:
      path: "{{ [ezproxy_ssl_path, current_file_name ~ '.crt'] | path_join }}"
      checksum_algorithm: sha256
    register: current_cert

  - name: Get checksum of local certificate
    ansible.builtin.stat:
      path: "{{ [local_ssl_path, 'ezproxy.crt'] | path_join }}"
      checksum_algorithm: sha256
    delegate_to: localhost
    run_once: true
    register: new_cert

  - block:
    - name: Copy certificate ca and crt files
      ansible.builtin.copy:
        src: "{{ [local_ssl_path, local_file_name ~ item.suffix] | path_join }}"
        dest: "{{ [ezproxy_ssl_path, current_file_name ~ item.suffix] | path_join }}"
        mode: "{{ item.mode }}"
        owner: 'root'
      loop:
          - { suffix: '.crt', mode: '0644'}
          - { suffix: '.ca', mode: '0644'}
          - { suffix: '.key', mode: '0600'}

    - name: Write active certificate
      ansible.builtin.copy:
        dest: "{{ [ ezproxy_ssl_path, 'active' ] | path_join }}"
        group: root
        owner: root
        mode: '644'
        content: "{{ current_certificate_number }}"

    - name: Restart ezproxy
      ansible.builtin.shell:
        cmd: 'restart-ezproxy.sh'
    when: new_cert.stat.checksum == current_cert.stat.checksum
